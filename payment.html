<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PUREMENT - Secure Payment</title>
    <link rel="stylesheet" href="stile.css">
</head>
<body>
    <main class="payment-wrapper">
        <div class="payment-card">
            <h2>Secure Payment</h2>
            <p>Enter your card details to complete the order</p>
            
            <form id="payment-form">
                <div class="input-group">
                    <label>Cardholder Name</label>
                    <input type="text" placeholder="LUKA ALTUNASHVILI" required>
                </div>

                <div class="input-group">
                    <label>Card Number</label>
                    <input type="text" placeholder="0000 0000 0000 0000" maxlength="19" required>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label>Expiry Date</label>
                        <input type="text" placeholder="MM/YY" maxlength="5" required>
                    </div>
                    <div class="input-group">
                        <label>CVV</label>
                        <input type="password" placeholder="***" maxlength="3" required>
                    </div>
                </div>

                <button type="submit" class="pay-btn">Pay Now</button>
                <a href="cart.html" class="back-link">Return to Cart</a>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('payment-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("გადახდა წარმატებულია გმადლობთ, რომ ირჩევთ PUREMENTს");
            localStorage.removeItem('PUREMENT_CART'); 
            window.location.href = 'index.html'; 
        });
    </script>
</body>
</html>
